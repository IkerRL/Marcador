<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Copa Primate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- MQTT.js para sincronización en tiempo real -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body>

<div class="main-container">
    <div class="team-wrapper team-left" onclick="openSelector('left')">
        <div class="team-info">
            <span id="name-left" class="team-name">SELECCIONAR</span>
            <div class="logo-box">
                <img id="img-left" src="placeholder-team.png" alt="Logo A">
            </div>
        </div>
        <div class="score-box" id="score-left" onclick="event.stopPropagation(); changeScore('left')">0</div>
    </div>

    <div class="tournament-center">
        <div class="row-top">
            <span class="main-title">Copa Primate</span>
        </div>
        
        <div class="row-bottom">
            <img src="monito-der.png" class="vol-logo" alt="Vol.I">
            <span class="sub-title">VOL.I</span>
            <img src="monito-izq.png" class="vol-logo monkey-right" id="monkeyRight" alt="Vol.I" style="cursor: pointer;" title="¡Haz clic para multijugador!">
        </div>
    </div>

    <div class="team-wrapper team-right" onclick="openSelector('right')">
        <div class="score-box" id="score-right" onclick="event.stopPropagation(); changeScore('right')">0</div>
        <div class="team-info">
            <div class="logo-box">
                <img id="img-right" src="placeholder-team.png" alt="Logo B">
            </div>
            <span id="name-right" class="team-name">SELECCIONAR</span>
        </div>
    </div>
</div>

<div id="team-selector" class="modal">
    <div class="modal-content">
        <h3>SELECCIONA EQUIPO</h3>
        <div class="team-grid" id="team-grid"></div>
        <button class="btn-close" onclick="closeSelector()">CANCELAR</button>
    </div>
</div>

<!-- PANEL MULTIJUGADOR / LIVE SYNC -->
<div class="sync-widget" id="syncWidget">
    <button class="sync-toggle-btn" id="syncToggleBtn">
        <span class="pulse-icon red" id="syncPulse"></span>
        <span class="toggle-text">📡 MULTIJUGADOR</span>
    </button>

    <div class="sync-panel" id="syncPanel">
        <h3 class="sync-title">LOBBY MULTIJUGADOR</h3>

        <div class="sync-status-row">
            <span class="status-label">ESTADO:</span>
            <span class="status-badge status-disconnected" id="syncStatusBadge">DESCONECTADO</span>
        </div>

        <div class="sync-field">
            <label for="syncRoomInput">CÓDIGO DE SALA</label>
            <div class="sync-input-row">
                <input type="text" id="syncRoomInput" placeholder="Ej: COPA-1234" maxlength="20">
                <button class="btn-sync-action" id="btnSyncConnect">CONECTAR</button>
            </div>
        </div>

        <div class="sync-connected-actions" id="syncConnectedActions" style="display: none;">
            <button class="btn-sync-secondary" id="btnSyncCopyLink">🔗 COPIAR ENLACE</button>
            <button class="btn-sync-secondary btn-danger" id="btnSyncDisconnect">SALIR</button>
        </div>

        <details class="sync-advanced">
            <summary>Configuración Avanzada</summary>
            <div class="sync-field" style="margin-top: 10px;">
                <label for="syncBrokerInput">BROKER MQTT</label>
                <input type="text" id="syncBrokerInput" value="wss://broker.hivemq.com:8884/mqtt">
            </div>
            <div class="sync-field">
                <label for="syncTopicInput">PREFIJO DE TEMA</label>
                <input type="text" id="syncTopicInput" value="copa_primate">
            </div>
        </details>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
